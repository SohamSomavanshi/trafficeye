<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Traffic Eye</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #ff2233; --amber: #ffaa00; --green: #00ff88;
      --bg: #0a0a0a; --panel: #111214; --border: #222428;
      --text: #e8eaf0; --dim: #555a66;
      --font-mono: 'Share Tech Mono', monospace;
      --font-ui: 'Barlow Condensed', sans-serif;
    }
    html, body { height: 100%; width: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100dvh; width: 100%; position: relative; }
    #header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel); z-index: 10; flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 28px; height: 28px; background: var(--red); clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); animation: pulse-icon 2s ease-in-out infinite; }
    @keyframes pulse-icon { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .logo-text { font-size: 20px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
    .logo-text span { color: var(--red); }
    #status-pill { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--dim); letter-spacing: 1px; transition: all 0.3s; }
    #status-pill.active  { color: var(--green); border-color: var(--green); }
    #status-pill.loading { color: var(--amber); border-color: var(--amber); }
    #status-pill.alert   { color: var(--red); border-color: var(--red); animation: blink 0.5s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    #viewport { position: relative; flex: 1; overflow: hidden; background: #000; }
    #camera { width: 100%; height: 100%; object-fit: cover; display: block; }
    #overlay { position: absolute; inset: 0; pointer-events: none; }
    #viewport::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 5; }
    .corner { position: absolute; width: 24px; height: 24px; border-color: rgba(255,34,51,0.6); border-style: solid; z-index: 6; }
    .corner.tl { top: 14px; left: 14px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 14px; right: 14px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 14px; left: 14px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 14px; right: 14px; border-width: 0 2px 2px 0; }
    #rec { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); display: none; align-items: center; gap: 6px; z-index: 7; font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; color: var(--red); }
    #rec.show { display: flex; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: blink 1s step-end infinite; }
    #bottom { background: var(--panel); border-top: 1px solid var(--border); padding: 12px 16px; flex-shrink: 0; z-index: 10; }
    #stats { display: flex; justify-content: space-around; margin-bottom: 12px; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-val { font-size: 26px; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; }
    .stat-val.red   { color: var(--red); }
    .stat-val.amber { color: var(--amber); }
    .stat-val.green { color: var(--green); }
    .stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); }
    #btn-start { width: 100%; padding: 14px; font-family: var(--font-ui); font-size: 16px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; border: none; border-radius: 4px; cursor: pointer; background: var(--red); color: #fff; transition: all 0.2s; position: relative; overflow: hidden; }
    #btn-start::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%); }
    #btn-start:active { transform: scale(0.98); }
    #btn-start.running { background: #1a1a1a; border: 1px solid var(--red); color: var(--red); }
    #btn-start:disabled { background: var(--border); color: var(--dim); cursor: not-allowed; }
    #log-section { background: var(--panel); border-top: 1px solid var(--border); max-height: 140px; overflow-y: auto; flex-shrink: 0; }
    #log-header { padding: 8px 16px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); border-bottom: 1px solid var(--border); font-family: var(--font-mono); position: sticky; top: 0; background: var(--panel); }
    .log-entry { padding: 7px 16px; font-family: var(--font-mono); font-size: 11px; color: var(--dim); border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; gap: 8px; align-items: flex-start; animation: slide-in 0.3s ease; }
    @keyframes slide-in { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
    .badge { padding: 1px 6px; border-radius: 2px; font-size: 9px; font-weight: 700; letter-spacing: 1px; flex-shrink: 0; margin-top: 1px; }
    .badge.helmet   { background: rgba(255,34,51,0.2); color: var(--red); }
    .badge.redlight { background: rgba(255,170,0,0.2); color: var(--amber); }
    .log-empty { padding: 16px; text-align: center; font-family: var(--font-mono); font-size: 11px; color: var(--dim); }
    #loading-overlay { position: absolute; inset: 0; background: rgba(10,10,10,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; gap: 16px; }
    #loading-overlay.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-msg { font-family: var(--font-mono); font-size: 12px; color: var(--dim); letter-spacing: 1px; }
    #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 15; }
    #flash.snap { animation: flash-anim 0.3s ease-out forwards; }
    @keyframes flash-anim { 0% { opacity: 0.8; } 100% { opacity: 0; } }
    #viewport.violation { box-shadow: inset 0 0 60px rgba(255,34,51,0.4); }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">TRAFFIC<span>EYE</span></div>
    </div>
    <div id="status-pill">STANDBY</div>
  </div>
  <div id="viewport">
    <video id="camera" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="rec"><div class="rec-dot"></div>REC</div>
    <div id="flash"></div>
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-msg">INITIALISING AI MODEL...</div>
    </div>
  </div>
  <div id="log-section">
    <div id="log-header">▸ VIOLATION LOG</div>
    <div id="log-list"><div class="log-empty">No violations detected yet.</div></div>
  </div>
  <div id="bottom">
    <div id="stats">
      <div class="stat"><div class="stat-val red"   id="count-helmet">0</div><div class="stat-label">No Helmet</div></div>
      <div class="stat"><div class="stat-val amber" id="count-redlight">0</div><div class="stat-label">Red Light</div></div>
      <div class="stat"><div class="stat-val green" id="count-total">0</div><div class="stat-label">Total</div></div>
    </div>
    <button id="btn-start" disabled>LOADING MODEL...</button>
  </div>
</div>

<script>
const state = {
  running: false, model: null, stream: null, animFrame: null,
  counts: { helmet: 0, redlight: 0 },
  lastViolationTime: 0,
  COOLDOWN_MS: 3000,
};

const video          = document.getElementById('camera');
const canvas         = document.getElementById('overlay');
const ctx            = canvas.getContext('2d');
const btnStart       = document.getElementById('btn-start');
const statusPill     = document.getElementById('status-pill');
const rec            = document.getElementById('rec');
const flash          = document.getElementById('flash');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingMsg     = document.getElementById('loading-msg');
const logList        = document.getElementById('log-list');
const viewport       = document.getElementById('viewport');

async function loadModel() {
  try {
    loadingMsg.textContent = 'LOADING TENSORFLOW...';
    await tf.ready();
    loadingMsg.textContent = 'LOADING COCO-SSD MODEL...';
    state.model = await cocoSsd.load({ base: 'mobilenet_v2' });
    loadingOverlay.classList.add('hidden');
    btnStart.disabled = false;
    btnStart.textContent = 'START MONITORING';
    setStatus('active', 'READY');
  } catch (e) {
    loadingMsg.textContent = 'MODEL LOAD FAILED. REFRESH.';
  }
}

async function startCamera() {
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false
    });
    video.srcObject = state.stream;
    await new Promise(r => video.onloadedmetadata = r);
    resizeCanvas();
  } catch (e) { alert('Camera access denied. Please allow camera permission and reload.'); }
}

function stopCamera() {
  if (state.stream) { state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }
}

function resizeCanvas() {
  canvas.width  = video.videoWidth  || video.clientWidth;
  canvas.height = video.videoHeight || video.clientHeight;
}
window.addEventListener('resize', resizeCanvas);

async function detectionLoop() {
  if (!state.running) return;
  const predictions = await state.model.detect(video);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let violationThisFrame = false;
  const now = Date.now();

  for (const pred of predictions) {
    const [x, y, w, h] = pred.bbox;
    const label = pred.class.toLowerCase();
    const score = Math.round(pred.score * 100);
    const isViolation = isViolatingDetection(pred, predictions);

    if (isViolation.flag) {
      ctx.strokeStyle = '#ff2233';
      ctx.lineWidth = 2.5;
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = 'rgba(255,34,51,0.85)';
      ctx.fillRect(x, y - 20, Math.max(w, 160), 20);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px "Share Tech Mono", monospace';
      ctx.fillText(`⚠ ${isViolation.type.toUpperCase()} ${score}%`, x + 4, y - 5);
      violationThisFrame = true;
      if (now - state.lastViolationTime > state.COOLDOWN_MS) {
        state.lastViolationTime = now;
        captureViolation(isViolation.type);
      }
    } else {
      ctx.strokeStyle = 'rgba(0,255,136,0.5)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = 'rgba(0,255,136,0.7)';
      ctx.fillRect(x, y - 18, Math.max(w, 100), 18);
      ctx.fillStyle = '#000';
      ctx.font = '10px "Share Tech Mono", monospace';
      ctx.fillText(`${label} ${score}%`, x + 4, y - 5);
    }
  }

  viewport.classList.toggle('violation', violationThisFrame);
  setStatus(violationThisFrame ? 'alert' : 'active', violationThisFrame ? 'VIOLATION!' : 'SCANNING...');
  state.animFrame = requestAnimationFrame(detectionLoop);
}

// ── KEY FIX: Only flag person if near a motorcycle ──
function isViolatingDetection(pred, allPreds) {
  const label = pred.class.toLowerCase();
  const [x, y, w, h] = pred.bbox;

  // Person only flagged if overlapping/close to a motorcycle
  if (label === 'person' && pred.score > 0.55) {
    const nearMotorcycle = allPreds.some(other =>
      other.class.toLowerCase() === 'motorcycle' &&
      boxesOverlapOrClose(pred.bbox, other.bbox, 80)
    );
    if (nearMotorcycle) return { flag: true, type: 'NO HELMET' };
  }

  // Motorcycle flagged if it has a nearby rider
  if (label === 'motorcycle' && pred.score > 0.55) {
    const hasRider = allPreds.some(other =>
      other.class.toLowerCase() === 'person' &&
      boxesOverlapOrClose(pred.bbox, other.bbox, 80)
    );
    if (hasRider) return { flag: true, type: 'NO HELMET' };
  }

  // Red traffic light with vehicle in frame
  if (label === 'traffic light' && pred.score > 0.5) {
    if (isRedLight(x, y, w, h)) {
      const vehicleNearby = allPreds.some(o =>
        ['car','motorcycle','truck','bus','bicycle'].includes(o.class.toLowerCase()) && o.score > 0.55
      );
      if (vehicleNearby) return { flag: true, type: 'RED LIGHT' };
    }
  }

  return { flag: false };
}

// Check if two bounding boxes overlap or are within margin px of each other
function boxesOverlapOrClose(a, b, m) {
  return !(a[0]-m > b[0]+b[2] || b[0]-m > a[0]+a[2] || a[1]-m > b[1]+b[3] || b[1]-m > a[1]+a[3]);
}

function isRedLight(x, y, w, h) {
  try {
    const sc = document.createElement('canvas');
    sc.width = canvas.width; sc.height = canvas.height;
    sc.getContext('2d').drawImage(video, 0, 0, sc.width, sc.height);
    const regionH = Math.max(1, Math.floor(h / 3));
    const data = sc.getContext('2d').getImageData(Math.max(0,Math.floor(x)), Math.max(0,Math.floor(y)), Math.max(1,Math.floor(w)), regionH).data;
    let red = 0;
    for (let i = 0; i < data.length; i += 4) {
      if (data[i] > 150 && data[i+1] < 80 && data[i+2] < 80) red++;
    }
    return red / (data.length / 4) > 0.25;
  } catch(e) { return false; }
}

function captureViolation(type) {
  flash.classList.remove('snap'); void flash.offsetWidth; flash.classList.add('snap');
  const now = new Date();
  const timestamp = now.toLocaleString('en-IN', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });

  if (type.includes('HELMET'))   { state.counts.helmet++;   document.getElementById('count-helmet').textContent   = state.counts.helmet; }
  if (type.includes('RED'))      { state.counts.redlight++; document.getElementById('count-redlight').textContent = state.counts.redlight; }
  document.getElementById('count-total').textContent = state.counts.helmet + state.counts.redlight;

  const snapCanvas = document.createElement('canvas');
  snapCanvas.width  = canvas.width;
  snapCanvas.height = canvas.height;
  const sc = snapCanvas.getContext('2d');
  sc.drawImage(video, 0, 0);
  sc.drawImage(canvas, 0, 0);

  sc.fillStyle = 'rgba(0,0,0,0.6)';
  sc.fillRect(0, snapCanvas.height - 28, snapCanvas.width, 28);
  sc.fillStyle = '#ff2233';
  sc.font = 'bold 13px "Share Tech Mono", monospace';
  sc.fillText(`${timestamp}  |  ${type}`, 10, snapCanvas.height - 9);

  navigator.geolocation.getCurrentPosition(
    pos => {
      sc.fillStyle = '#ffaa00'; sc.font = '11px "Share Tech Mono", monospace';
      sc.fillText(`GPS: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`, 10, snapCanvas.height - 26);
      saveAndLog(snapCanvas, type, timestamp, pos.coords.latitude, pos.coords.longitude);
    },
    () => saveAndLog(snapCanvas, type, timestamp, null, null)
  );
}

function saveAndLog(snapCanvas, type, timestamp, lat, lng) {
  const dataURL = snapCanvas.toDataURL('image/jpeg', 0.85);
  const existing = JSON.parse(localStorage.getItem('trafficEyeViolations') || '[]');
  existing.unshift({ id: Date.now(), type, timestamp, lat, lng, image: dataURL });
  if (existing.length > 50) existing.pop();
  localStorage.setItem('trafficEyeViolations', JSON.stringify(existing));
  addLogEntry({ type, timestamp, lat, lng });
  sendViolationEmail({ type, timestamp, lat, lng, image: dataURL });
}

async function sendViolationEmail({ type, timestamp, lat, lng, image }) {
  try {
    const res = await fetch('https://unmagnetic-rosie-sessional.ngrok-free.dev/send-violation', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, timestamp, lat, lng, image })
    });
    const data = await res.json();
    if (data.success) console.log('[✓] Email sent');
    else console.warn('[✗] Email failed:', data.error);
  } catch (e) { console.warn('[✗] Server unreachable:', e.message); }
}

function addLogEntry({ type, timestamp, lat, lng }) {
  const empty = logList.querySelector('.log-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `<span class="badge ${type.includes('HELMET') ? 'helmet' : 'redlight'}">${type}</span><span>${timestamp} — ${lat ? lat.toFixed(4)+','+lng.toFixed(4) : 'GPS unavail.'}</span>`;
  logList.prepend(div);
}

btnStart.addEventListener('click', async () => {
  if (!state.running) {
    state.running = true;
    btnStart.textContent = 'STOP MONITORING';
    btnStart.classList.add('running');
    rec.classList.add('show');
    await startCamera();
    resizeCanvas();
    setStatus('active', 'SCANNING...');
    detectionLoop();
  } else {
    state.running = false;
    cancelAnimationFrame(state.animFrame);
    stopCamera();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    rec.classList.remove('show');
    btnStart.textContent = 'START MONITORING';
    btnStart.classList.remove('running');
    viewport.classList.remove('violation');
    setStatus('active', 'READY');
  }
});

function setStatus(type, text) {
  statusPill.textContent = text;
  statusPill.className = '';
  statusPill.classList.add(type === 'alert' ? 'alert' : type === 'loading' ? 'loading' : 'active');
}

loadModel();
</script>
</body>
</html>
